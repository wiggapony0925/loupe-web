name: web CI

# Gates every PR (and pushes to main) on the loupe-web checks. The Expo app
# (loupe-frontend) isn't a workspace member, so `npm ci` only installs
# packages/* + loupe-web — this stays fast.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: loupe-web — typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -w loupe-web

      - name: Unit tests
        run: npm test -w loupe-web

      - name: Build
        run: npm run build -w loupe-web

      - name: Install Playwright Chromium
        working-directory: loupe-web
        run: npx playwright install --with-deps chromium

      - name: Storybook story tests
        run: npm run test:stories -w loupe-web
