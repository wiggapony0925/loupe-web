<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0b0d" />

    <title>Loupe — Scan, value &amp; track your trading cards</title>
    <meta
      name="description"
      content="Loupe turns your trading-card collection into a live portfolio. Scan any Pokémon, Magic, or Yu-Gi-Oh! card and track grade-aware market values across web and mobile."
    />
    <link rel="canonical" href="https://loupe-web-714615078104.us-central1.run.app/" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (link previews on iMessage, Slack, Discord, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Loupe" />
    <meta property="og:title" content="Loupe — Scan, value &amp; track your trading cards" />
    <meta
      property="og:description"
      content="Scan any Pokémon, Magic, or Yu-Gi-Oh! card and track grade-aware market values across web and mobile."
    />
    <meta property="og:url" content="https://loupe-web-714615078104.us-central1.run.app/" />
    <meta property="og:image" content="https://loupe-web-714615078104.us-central1.run.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Loupe — scan, value & track your trading cards" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Loupe — Scan, value &amp; track your trading cards" />
    <meta
      name="twitter:description"
      content="Scan any Pokémon, Magic, or Yu-Gi-Oh! card and track grade-aware market values across web and mobile."
    />
    <meta name="twitter:image" content="https://loupe-web-714615078104.us-central1.run.app/og-image.png" />
    <!-- Type system: Fraunces (editorial display serif) + Inter (UI sans). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <!--
      No-flash theme bootstrap (CXO-style): resolve the persisted/system theme and
      stamp `data-theme` on <html> BEFORE first paint so there is no light/dark flash.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("loupe.theme");
          var mode = stored || "system";
          var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = mode === "system" ? (systemDark ? "dark" : "light") : mode;
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
