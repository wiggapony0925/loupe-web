# nginx for the Loupe web SPA on Cloud Run.
# Serves the static build and reverse-proxies the API to the backend BFF so the
# browser talks to a single origin (no CORS, no bearer-token exposure in config).

# Link-preview crawlers don't run JS, so a SPA can't give them per-card OG tags.
# Detect them and route /cards/:id to the backend's server-rendered share page.
# The second pattern matches iMessage / LinkPresentation, whose UA ends right
# after "(KHTML, like Gecko)" (a real Safari UA continues with Version/…Safari).
map $http_user_agent $is_link_crawler {
  default 0;
  "~*(facebookexternalhit|Facebot|Twitterbot|Slackbot|Slack-ImgProxy|Discordbot|WhatsApp|LinkedInBot|TelegramBot|SkypeUriPreview|Applebot|redditbot|Pinterest|vkShare|Embedly|Iframely|Googlebot|bingbot|DuckDuckBot|Google-PageRenderer|Qwantify|nuzzel)" 1;
  "~*AppleWebKit/[0-9.]+ \(KHTML, like Gecko\)$" 1;
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers (defense-in-depth, applied to every response) ──
  # CSP is the primary XSS mitigation: even if markup were injected, the browser
  # won't run inline or foreign scripts, so an attacker can't read the auth token
  # out of localStorage. `script-src 'self'` is viable because the theme
  # bootstrap is externalized (public/theme-init.js); the only off-origin scripts
  # allowed are the optional Google / Apple sign-in SDKs. `frame-ancestors 'none'`
  # blocks clickjacking; `connect-src 'self'` keeps API calls same-origin (/v1).
  set $csp "default-src 'self'; script-src 'self' https://accounts.google.com https://appleid.cdn-apple.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://accounts.google.com https://appleid.apple.com; frame-src https://accounts.google.com https://appleid.apple.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests";
  add_header Content-Security-Policy $csp always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=()" always;
  # OAuth popups (Apple) postMessage back to us — allow that while isolating us.
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Hashed build assets are immutable — cache hard.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    # nginx drops inherited add_header once a location sets its own, so re-assert
    # the headers that matter for static asset responses.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  }

  # Versioned API surface → backend Cloud Run service.
  location /v1/ {
    proxy_pass https://loupe-api-wrrcqaayra-uc.a.run.app;
    proxy_set_header Host loupe-api-wrrcqaayra-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # WebSocket passthrough (live price ticks + scan progress). Long read
  # timeout: these are push channels that stay open across market hours.
  location /ws/ {
    proxy_pass https://loupe-api-wrrcqaayra-uc.a.run.app;
    proxy_set_header Host loupe-api-wrrcqaayra-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
  }

  # System health passthrough.
  location = /health {
    proxy_pass https://loupe-api-wrrcqaayra-uc.a.run.app/health;
    proxy_set_header Host loupe-api-wrrcqaayra-uc.a.run.app;
    proxy_ssl_server_name on;
  }

  # Card detail: crawlers get the server-rendered OG page (the card's own
  # image + name + price); humans get the SPA shell.
  location ~ "^/cards/(?<card_id>[^/]+)/?$" {
    if ($is_link_crawler) {
      rewrite ^ /_share/$card_id last;
    }
    try_files /index.html =404;
  }

  # Internal-only: proxy a crawler's card request to the backend share page.
  location ~ "^/_share/(?<share_id>.+)$" {
    internal;
    proxy_pass https://loupe-api-wrrcqaayra-uc.a.run.app/v1/share/card/$share_id;
    proxy_set_header Host loupe-api-wrrcqaayra-uc.a.run.app;
    proxy_ssl_server_name on;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 15s;
  }

  # SPA fallback — every other path renders index.html (client-side routing).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
